name: Question
about: Ask a question about the project
title: "[Q]"
labels: ["question"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking a question! Before you submit, please make sure you have:

        - Searched the project's README and documentation.
        - Searched for existing GitHub issues in this repository.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Please provide your question in as much detail as possible.
      placeholder: What are you trying to do, and where are you blocked?
    validations:
      required: true
